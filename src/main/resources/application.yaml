spring:
  application:
    name: quantum-random-service
server:
  port: ${PORT:10000}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: http://jaeger:4318/v1/traces

logging:
  level:
    com.leporonitech.quantum_random_service: DEBUG
