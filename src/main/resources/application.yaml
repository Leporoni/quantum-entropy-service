spring:
  application:
    name: quantum-random-service
server:
  port: ${PORT:10000}

management:
  endpoints:
    web:
      exposure:
        include: health, info, prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  tracing:
    sampling:
      probability: 1.0
  otlp:
    tracing:
      endpoint: ${OTEL_EXPORTER_OTLP_ENDPOINT:http://jaeger:4318/v1/traces}

logging:
  level:
    com.leporonitech.quantum_random_service: DEBUG
