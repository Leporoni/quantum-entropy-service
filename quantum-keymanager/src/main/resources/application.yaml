spring:
  application:
    name: quantum-keymanager
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:quantum_db}
    username: ${DB_USER:quantum_user}
    password: ${DB_PASSWORD:quantum_pass}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: ${PORT:10000}

security:
  master-key: ${MASTER_KEY_SECRET}
