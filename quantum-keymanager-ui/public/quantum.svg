<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Nucleus -->
  <circle cx="16" cy="16" r="2" fill="#00f2ff">
    <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <!-- Quantum Orbits -->
  <ellipse cx="16" cy="16" rx="14" ry="5" stroke="#00f2ff" stroke-width="1" transform="rotate(45 16 16)" />
  <ellipse cx="16" cy="16" rx="14" ry="5" stroke="#00f2ff" stroke-width="1" transform="rotate(-45 16 16)" />
  <ellipse cx="16" cy="16" rx="14" ry="5" stroke="#00f2ff" stroke-width="1" transform="rotate(90 16 16)" />
  
  <!-- Glowing points -->
  <circle cx="16" cy="2" r="1.5" fill="#00f2ff" />
  <circle cx="16" cy="30" r="1.5" fill="#00f2ff" />
</svg>
