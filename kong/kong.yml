_format_version: "3.0"

services:
  - name: quantum-service
    url: http://quantum-service:10000
    routes:
      - name: quantum-route
        paths:
          - /api/v1/quantum-random
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  - name: keymanager
    url: http://quantum-keymanager:10000
    routes:
      - name: keys-route
        paths:
          - /api/v1/keys
          - /api/v1/quantum-entropy
        strip_path: false
    plugins:
      - name: rate-limiting
        config:
          minute: 100
          policy: local

  - name: grafana
    url: http://grafana:3000
    routes:
      - name: grafana-route
        paths:
          - /grafana
        strip_path: false
        regex_priority: 100

  - name: prometheus
    url: http://prometheus:9090
    routes:
      - name: prometheus-route
        paths:
          - /prometheus
        strip_path: false
        regex_priority: 100

  - name: jaeger
    url: http://jaeger:16686
    routes:
      - name: jaeger-route
        paths:
          - /jaeger
        strip_path: false
        regex_priority: 100

  - name: ui
    url: http://quantum-keymanager-ui:80
    routes:
      - name: ui-route
        paths:
          - /
        strip_path: false
        regex_priority: 1

plugins:
  - name: prometheus
