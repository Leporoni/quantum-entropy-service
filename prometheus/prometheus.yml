global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'kong'
    static_configs:
      - targets: ['kong:8001']

  - job_name: 'quantum-service'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['quantum-service:10000']

  - job_name: 'keymanager'
    metrics_path: '/actuator/prometheus'
    static_configs:
      - targets: ['quantum-keymanager:10000']
